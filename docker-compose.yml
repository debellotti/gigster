version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: gig-postgres
    environment:
      POSTGRES_USER: gig_user
      POSTGRES_PASSWORD: gig_password
      POSTGRES_DB: gig_db
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gig_user -d gig_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: gig-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: gig-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  nifi:
    image: apache/nifi:latest
    container_name: gig-nifi
    ports:
      - "8161:8161"
    environment:
      NIFI_WEB_HTTPS_PORT: 8161
      NIFI_CLUSTER_IS_NODE: "false"
    volumes:
      - ./nifi/flow/migration-flow.xml:/opt/nifi/nifi-current/conf/flow.xml
      - nifi_data:/opt/nifi/nifi-current/conf
      - ./nifi/flow:/opt/nifi/nifi-current/conf
      - ./nifi/state:/opt/nifi/nifi-current/state
      - ./nifi/database_repository:/opt/nifi/nifi-current/database_repository
      - ./nifi/flowfile_repository:/opt/nifi/nifi-current/flowfile_repository
      - ./nifi/content_repository:/opt/nifi/nifi-current/content_repository
      - ./nifi/provenance_repository:/opt/nifi/nifi-current/provenance_repository
      - ./data:/data

  java-service:
    build:
      context: ./java-service
      dockerfile: Dockerfile
    container_name: gig-java-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/gig_db
      SPRING_DATASOURCE_USERNAME: gig_user
      SPRING_DATASOURCE_PASSWORD: gig_password
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data

volumes:
  postgres_data:
  nifi_data:
